# kidsai-server nginx vhost (W4.5 B3)
#
# 假设:
# - 已有 nginx (sites-available / sites-enabled 结构, 或直接 conf.d)
# - 证书路径: /etc/nginx/ssl/kids.ibi.ren.{pem,key}
# - 上游 kidsai-server 监听 127.0.0.1:8080
# - 不影响 ibi.ren ECS 上其他 site (此文件只描述 kids.ibi.ren 自身)
#
# 启用:
#   sudo ln -s /etc/nginx/sites-available/kids.ibi.ren /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# --- HTTP → HTTPS redirect (单独 server block, 不影响其他 site) ---
server {
    listen 80;
    listen [::]:80;
    server_name kids.ibi.ren;

    # Let's Encrypt 续签需要 (若用 certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他请求全转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS 主站 ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kids.ibi.ren;

    # 证书 (证书包来自 Downloads/26041845_kids.ibi.ren_nginx.zip, 解压后放到 /etc/nginx/ssl/)
    ssl_certificate     /etc/nginx/ssl/kids.ibi.ren.pem;
    ssl_certificate_key /etc/nginx/ssl/kids.ibi.ren.key;

    # 现代 TLS (Mozilla intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 上游日志
    access_log /var/log/nginx/kids.ibi.ren.access.log;
    error_log  /var/log/nginx/kids.ibi.ren.error.log;

    # 上游 kidsai-server (systemd unit 内监听 127.0.0.1:8080)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # /healthz 不限流 (LB / 监控用)
    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        access_log off;
    }

    # 文件上传上限 (LLM 多模态未来可能上传图, 先放开 32MB)
    client_max_body_size 32m;
}