# assets.kids.ibi.ren nginx vhost (W6 B2)
#
# 静态托管 200 张预生成资产 (PNG/JPG, ~50MB), 桌面端直拉.
# 跟 api.kids.ibi.ren 完全独立: 不同 server_name, 不同证书, 不同 root.
#
# 启用:
#   sudo cp deploy/nginx-assets.kids.ibi.ren.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 证书: /etc/nginx/ssl/assets.kids.ibi.ren.{pem,key} (DigiCert DV, lihao 走现有 certbot 流程申请)
#
# 缓存策略:
# - 单文件 (image_url 命中): Cache-Control 30 天 immutable, 因为 manifest
#   自带 version, 客户端拿到新 manifest 就改 URL, 老 URL 直接踢.
# - /api/v1/asset-manifest: 1h cache + ETag (API route, 见 routes/asset.py)
#
# 体积: 全 ~50MB, 一台机器直 nginx 完全够; 不上 CDN (F5 in W6 plan).

# ============================================================
# HTTP → HTTPS 重定向
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name assets.kids.ibi.ren;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS — 静态资源主站
# ============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name assets.kids.ibi.ren;

    ssl_certificate     /etc/nginx/ssl/assets.kids.ibi.ren.pem;
    ssl_certificate_key /etc/nginx/ssl/assets.kids.ibi.ren.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    access_log /var/log/nginx/assets.kids.ibi.ren.access.log;
    error_log  /var/log/nginx/assets.kids.ibi.ren.error.log;

    # 静态资产根目录 — 见 install.sh 创建
    root /var/www/assets;
    index index.html;

    # 1h 默认缓存 (manifest endpoint 走这条)
    location = /asset-manifest.json {
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "application/json; charset=utf-8" always;
        try_files $uri =404;
    }

    # 静态图片: 30 天 immutable (manifest 自带 version, 客户端换 URL 就行)
    location / {
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    # 隐藏目录列表 — 安全 + 视觉
    autoindex off;
}