# W6 B1: Asset manifest spec (~200 entries)
#
# 每个 entry = 一张 MiniMax image-01 生成任务. 跑批脚本读这个 yaml,
# 串行调 https://api.minimaxi.com/v1/image_generation, 下载到
# assets/<kind>/<key>.<ext>, 写 assets/asset_manifest.json.
#
# 字段:
#   key:       manifest 里用的字符串 key (前端按这个索引)
#   kind:      子目录 (character / style / bg / storyboard / icon /
#              home / face_action / bgm_thumb / reserved)
#   prompt:    MiniMax prompt (英文, 不用中文 — image-01 对英文更稳)
#   aspect:    "1:1" | "16:9" | "9:16" | "4:3"
#   negative:  反向词, 默认含 "blurry, low quality, deformed hands, watermark"
#
# 关键设计:
# - 所有 prompt 都用 "kids illustration, child-friendly, ..." 关键词加保险
# - 同一角色 (xiaoqi / xiaoyue / xiaoxing) prompt 加固定锚点 (round head,
#   soft eyes) 保持身份一致
# - 风格预设 (anime / cartoon / clay / ink / line-drawing / photo / pixel)
#   用统一词表让 image-01 输出风格一致

defaults:
  negative: "blurry, low quality, deformed hands, deformed face, watermark, text, signature, scary, violent"
  aspect_default: "1:1"

