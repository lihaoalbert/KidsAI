# api.kids.ibi.ren nginx vhost (W4.5 B3 — RHEL/RedHat conf.d 风格)
#
# 桌面端 KIDSAI_SERVER_URL=https://api.kids.ibi.ren 直连后端 API.
# 跟 kids.ibi.ren 共用一个上游 (127.0.0.1:8080), 但证书 / server_name 各自分开,
# 通过 server_name 路由分发, 互不影响.
#
# 启用:
#   sudo cp deploy/nginx-api.kids.ibi.ren.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 预期证书: /etc/nginx/ssl/api.kids.ibi.ren.{pem,key}
#   来自 Downloads/26043757_api.kids.ibi.ren_nginx.zip (DigiCert DV)

# ============================================================
# HTTP → HTTPS 重定向 (80 端口)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.kids.ibi.ren;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS 主站 (api.kids.ibi.ren — 桌面端 license 控制平面入口)
# ============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.kids.ibi.ren;

    ssl_certificate     /etc/nginx/ssl/api.kids.ibi.ren.pem;
    ssl_certificate_key /etc/nginx/ssl/api.kids.ibi.ren.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    access_log /var/log/nginx/api.kids.ibi.ren.access.log;
    error_log  /var/log/nginx/api.kids.ibi.ren.error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # /healthz 不限流 (LB / 监控)
    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        access_log off;
    }

    # License / activate 请求体小, 1MB 足矣 (admin grant JSON 也小)
    client_max_body_size 1m;
}
